services:
  db:
    image: postgres:17
    container_name: db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgresql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d db_notification" ]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: notification
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: